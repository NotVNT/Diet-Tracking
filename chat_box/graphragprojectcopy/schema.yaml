version: 1.0 datasets: foods: description: > Bảng thực phẩm thô, chứa thông tin dinh dưỡng, vitamin, khoáng chất, dị ứng và các thẻ sức khỏe. Mỗi dòng là một thực phẩm riêng lẻ. fields: id: type: string description: Mã định danh duy nhất cho thực phẩm (ví dụ: food_001). name_vi: type: string description: Tên thực phẩm bằng tiếng Việt. name_en: type: string description: Tên thực phẩm bằng tiếng Anh. category: type: string description: Nhóm thực phẩm (trái cây, rau củ, thịt, cá...). weight_grams: type: number description: Khối lượng trung bình của một đơn vị thực phẩm (gram). calories: type: number description: Lượng calo tính theo 100g thực phẩm. protein: type: number description: Hàm lượng protein (g/100g). carbs: type: number description: Hàm lượng carbohydrate (g/100g). fat: type: number description: Hàm lượng chất béo (g/100g). vitamins: type: list description: Danh sách vitamin có trong thực phẩm. minerals: type: list description: Danh sách khoáng chất có trong thực phẩm. allergen: type: list description: Các chất gây dị ứng có trong thực phẩm (nếu có). health_tags: type: list description: Các thẻ sức khỏe mô tả lợi ích hoặc đặc tính dinh dưỡng. description: type: text description: Mô tả tự nhiên về thực phẩm để chatbot hiểu rõ hơn. dishes: description: > Bảng món ăn đã chế biến, bao gồm nguyên liệu, dinh dưỡng tổng, dị ứng và thẻ sức khỏe. Mỗi dòng là một món ăn hoàn chỉnh. fields: dish_id: type: string description: Mã định danh duy nhất cho món ăn (ví dụ: dish_001). dish_name: type: string description: Tên món ăn bằng tiếng Việt. category: type: string description: Loại món ăn (món chính, salad, súp, ăn sáng...). ingredients: type: list description: Danh sách nguyên liệu dạng chữ (không kèm gram). ingredient_ids: type: list description: Danh sách ID thực phẩm thô tương ứng trong foods.csv. calories: type: number description: Tổng lượng calo của món ăn sau khi chế biến. protein: type: number description: Tổng lượng protein của món ăn. carbs: type: number description: Tổng lượng carbohydrate của món ăn. fat: type: number description: Tổng lượng chất béo của món ăn. allergen: type: list description: Các chất gây dị ứng có trong món ăn. health_tags: type: list description: Các thẻ sức khỏe mô tả đặc tính dinh dưỡng của món. description: type: text description: Mô tả tự nhiên về món ăn để chatbot hiểu rõ hơn. relationships: - name: dish_uses_food from: dishes.ingredient_ids to: foods.id description: > Mối quan hệ giữa món ăn và các thực phẩm thô được sử dụng làm nguyên liệu. - name: food_contains_vitamin from: foods.id to: foods.vitamins description: > Mối quan hệ giữa thực phẩm và các vitamin có trong thực phẩm. - name: food_contains_mineral from: foods.id to: foods.minerals description: > Mối quan hệ giữa thực phẩm và các khoáng chất có trong thực phẩm. - name: food_has_health_tag from: foods.id to: foods.health_tags description: > Mối quan hệ giữa thực phẩm và các thẻ sức khỏe. - name: dish_has_health_tag from: dishes.dish_id to: dishes.health_tags description: > Mối quan hệ giữa món ăn và các thẻ sức khỏe. - name: dish_has_allergen from: dishes.dish_id to: dishes.allergen description: > Mối quan hệ giữa món ăn và các chất gây dị ứng. - name: food_has_allergen from: foods.id to: foods.allergen description: > Mối quan hệ giữa thực phẩm và các chất gây dị ứng.